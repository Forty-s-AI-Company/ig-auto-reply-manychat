name: Update Staging Alias

on:
  deployment_status:
  workflow_dispatch:
    inputs:
      deployment_url:
        description: "Vercel Preview deployment URL, for example https://inboxpilot-xxxx.vercel.app"
        required: true
        type: string

permissions:
  contents: read

concurrency:
  group: staging-alias
  cancel-in-progress: false

env:
  STAGING_ALIAS: staging.carry-digital-nomad.in.net
  STAGING_BRANCH_ALIAS: inboxpilot-git-staging-a25814740s-projects.vercel.app
  PRODUCTION_ALIAS: inboxpilot.carry-digital-nomad.in.net

jobs:
  update-staging-alias:
    name: Point staging alias at latest Preview deployment
    runs-on: ubuntu-latest
    if: >-
      github.event_name == 'workflow_dispatch' ||
      github.event_name == 'deployment_status'
    env:
      DEPLOYMENT_URL: ${{ github.event_name == 'workflow_dispatch' && inputs.deployment_url || github.event.deployment_status.target_url }}
      VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
      VERCEL_SCOPE: ${{ secrets.VERCEL_SCOPE }}
    steps:
      - name: Validate Preview deployment URL
        id: validate
        shell: bash
        run: |
          set -euo pipefail

          if [ -z "${VERCEL_TOKEN:-}" ]; then
            echo "Missing required GitHub Secret: VERCEL_TOKEN"
            exit 1
          fi

          if [ -z "${DEPLOYMENT_URL:-}" ]; then
            echo "No deployment URL was provided by the GitHub deployment_status event or workflow_dispatch input."
            exit 1
          fi

          HOST="$(node -e 'const value = process.env.DEPLOYMENT_URL; try { console.log(new URL(value).hostname); } catch { process.exit(1); }')"

          if [[ "${HOST}" != *.vercel.app ]]; then
            echo "Refusing to alias non-Vercel Preview host: ${HOST}"
            exit 1
          fi

          if [[ "${HOST}" == "${STAGING_ALIAS}" || "${HOST}" == "${PRODUCTION_ALIAS}" ]]; then
            echo "Refusing to alias a custom domain back onto staging: ${HOST}"
            exit 1
          fi

          VERCEL_ARGS=()
          if [ -n "${VERCEL_SCOPE:-}" ]; then
            VERCEL_ARGS+=(--scope "${VERCEL_SCOPE}")
          fi

          INSPECT_OUTPUT="$(npx --yes vercel@latest inspect "${DEPLOYMENT_URL}" --token "${VERCEL_TOKEN}" "${VERCEL_ARGS[@]}")"
          echo "${INSPECT_OUTPUT}"

          if ! grep -Fq "https://${STAGING_BRANCH_ALIAS}" <<< "${INSPECT_OUTPUT}"; then
            echo "Skipping non-staging branch Preview deployment: ${HOST}"
            echo "should_update=false" >> "${GITHUB_OUTPUT}"
            exit 0
          fi

          if ! grep -Fq "● Ready" <<< "${INSPECT_OUTPUT}"; then
            echo "Skipping staging Preview deployment because it is not Ready yet: ${HOST}"
            echo "should_update=false" >> "${GITHUB_OUTPUT}"
            exit 0
          fi

          echo "Validated staging branch Preview deployment host: ${HOST}"
          echo "should_update=true" >> "${GITHUB_OUTPUT}"

      - name: Update staging alias
        if: steps.validate.outputs.should_update == 'true'
        shell: bash
        run: |
          set -euo pipefail

          VERCEL_ARGS=()
          if [ -n "${VERCEL_SCOPE:-}" ]; then
            VERCEL_ARGS+=(--scope "${VERCEL_SCOPE}")
          fi

          npx --yes vercel@latest alias set "${DEPLOYMENT_URL}" "${STAGING_ALIAS}" \
            --token "${VERCEL_TOKEN}" \
            "${VERCEL_ARGS[@]}"
